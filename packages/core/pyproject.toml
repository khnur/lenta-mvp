[project]
name = "lenta-core"
version = "0.1.0"
description = "Shared library: db models, features, ALS+LightGBM, eval, registry, mock data"
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.26,<2.0",
    "scipy>=1.11,<1.14",
    "pandas>=2.1,<3",
    "scikit-learn>=1.4,<2",
    "implicit>=0.7.2,<0.8",
    "lightgbm>=4.3,<5",
    "sqlalchemy>=2.0,<2.1",
    "psycopg[binary]>=3.2,<4",
    "redis>=5.0,<6",
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lenta_core"]
